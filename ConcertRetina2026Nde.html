.hover-title {
  display: inline;
  pointer-events: auto;
  cursor: pointer;
  font-family: helvetica;
  font-size: 24px;
}

.hover-image {
  display: none;
}

body:not(.mobile) .hover-title:hover + .hover-image {
  display: flex;
  pointer-events: none;
}

.hover-image {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: -1;
  pointer-events: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  /* Change width and height to scale images */
  width: 95vw;
  height: 95vh;
}

.hover-image img {
  max-width: 100% !important;
  max-height: 100% !important;
  width: auto !important;
  height: auto !important;
  margin-bottom: 0;
}
 .hover-title {
    display: inline-block;
    margin: 4px;
    cursor: pointer;
    color: #0055aa;
    text-decoration: underline;
  }

  .hover-mini {
    width: 7px;
    height: 14px;
    border-radius: 50%;
    border: none;
    margin: 4px;
    background-color: #4da3ff;
    cursor: pointer;
    display: inline-block;
    padding: 0;
  }
  .hover-mini:hover {
    background-color: #1c7be0;
  }

  #hover-preview {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    z-index: 9999;
    background: #fff;
    border: 1px solid #ccc;
    padding: 6px;
  }

  #hover-preview img {
    max-width: 400px;
    max-height: 300px;
  }
  #hover-preview img {
    max-width: 90vw;
    max-height: 90vh;
}

  display: inline-block;

  border-radius: 50%;
  cursor: pointer;

}

  content: "▶";

  font-size: 20px;
  position: absolute;
  top: 50%;
  left: 50%;

}

}

<div id="hover-preview"></div>
<script>
document.addEventListener("mouseover", e => {
  const target = e.target;

  if (!target.dataset.hover) return;

  const img = target.dataset.hover;
  const preview = document.getElementById("hover-preview");

  preview.innerHTML = `<img src="./img/${img}">`;
  preview.style.display = "block";
});

document.addEventListener("mouseout", e => {
  const target = e.target;
  if (target.dataset && target.dataset.hover) {
    document.getElementById("hover-preview").style.display = "none";
  }
});
</script>
