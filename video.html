
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lecture vidéo</title>

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
  }
</style>

</head>
<body>

<video controls autoplay></video>

<script>
  const params = new URLSearchParams(window.location.search);
  const src = params.get("src");
  if (src) {
    document.querySelector("video").src = src;
  }
</script>

</body>
</html>
